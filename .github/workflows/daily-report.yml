name: Daily Lecture PDF Report

on:
  # schedule trigger disabled — this pipeline was hitting the Gemini free-tier
  # rate limit and running past the 120min timeout most nights (see repo
  # history). Superseded by the ta-session-analyzer Streamlit app. Kept as
  # workflow_dispatch only so it can still be run manually if ever needed.
  # schedule:
  #   - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Target date YYYY-MM-DD (defaults to yesterday if left blank)"
        required: false
        default: ""
      list_tabs:
        description: "Debug: print exact sheet tab names and exit, instead of running the pipeline"
        required: false
        type: boolean
        default: false

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily pipeline
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          SHEET_ID: ${{ secrets.SHEET_ID }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
        run: |
          if [ "${{ github.event.inputs.list_tabs }}" = "true" ]; then
            python daily_pdf_pipeline.py --list-tabs
          elif [ -n "${{ github.event.inputs.date }}" ]; then
            python daily_pdf_pipeline.py --date "${{ github.event.inputs.date }}"
          else
            python daily_pdf_pipeline.py
          fi
